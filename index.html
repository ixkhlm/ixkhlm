<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ixkhlm.wiki</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(0, 255, 68, 0.04), transparent 25rem),
        radial-gradient(circle at center, #101111 0%, #050606 54%, #000 100%);
      color: #eaffef;
      font-family: Arial, Helvetica, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.014) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);
      background-size: 4px 4px;
      opacity: 0.28;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 0%, transparent 45%, rgba(0,0,0,0.82) 100%);
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(520px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(18,20,20,0.94), rgba(8,9,9,0.94));
      box-shadow:
        0 28px 90px rgba(0,0,0,0.68),
        inset 0 1px 0 rgba(255,255,255,0.035);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .icon-box {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(0,255,70,0.42);
      border-radius: 9px;
      background: rgba(0,255,70,0.08);
      color: #00ff46;
      box-shadow: 0 0 26px rgba(0,255,70,0.12);
    }

    .icon-box svg {
      width: 21px;
      height: 21px;
      fill: currentColor;
    }

    h1 {
      margin: 0;
      font-size: 1.22rem;
      line-height: 1;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      background: linear-gradient(
        90deg,
        #eaffef 0%,
        #eaffef 38%,
        #00ff46 50%,
        #eaffef 62%,
        #eaffef 100%
      );
      background-size: 220% 100%;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: textSweep 2.4s linear infinite;
    }

    @keyframes textSweep {
      from { background-position: 100% 0; }
      to { background-position: -120% 0; }
    }

    .field {
      position: relative;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 48px 0 16px;
      color: rgba(255,255,255,0.72);
      background: rgba(0,0,0,0.24);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 7px;
      outline: none;
      font: inherit;
      letter-spacing: 0.12em;
    }

    input:focus {
      border-color: rgba(0,255,70,0.48);
      box-shadow: 0 0 0 3px rgba(0,255,70,0.08);
    }

    input::placeholder {
      color: rgba(255,255,255,0.28);
    }

    .lock {
      position: absolute;
      top: 50%;
      right: 10px;
      width: 28px;
      height: 28px;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      border: 1px solid rgba(0,255,70,0.36);
      border-radius: 6px;
      color: #00ff46;
      background: rgba(0,255,70,0.08);
    }

    .lock svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    button {
      font: inherit;
      border: 0;
      text-transform: uppercase;
      cursor: pointer;
    }

    .auth-button {
      width: 100%;
      height: 52px;
      border-radius: 9px;
      color: #001a07;
      background: #00f044;
      font-weight: 800;
      letter-spacing: 0.12em;
      box-shadow: 0 14px 34px rgba(0,255,70,0.18);
    }

    .auth-button:hover {
      background: #16ff57;
    }

    .key-button,
    .proceed-button {
      display: block;
      width: fit-content;
      margin: 22px auto 0;
      padding: 0;
      color: #00ff46;
      background: transparent;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.1em;
    }

    .divider {
      height: 1px;
      margin-top: 24px;
      background: rgba(255,255,255,0.08);
    }

    .label {
      margin: 0 0 12px;
      color: #00ff46;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .generated-key {
      padding: 18px;
      border: 1px dashed rgba(0,255,70,0.42);
      border-radius: 9px;
      color: #00ff46;
      background: rgba(0,255,70,0.045);
      text-align: center;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.7;
      letter-spacing: 0.06em;
      overflow-wrap: anywhere;
      box-shadow: inset 0 0 22px rgba(0,255,70,0.04);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .secondary-button {
      height: 42px;
      border: 1px solid rgba(0,255,70,0.3);
      border-radius: 7px;
      color: #72ff91;
      background: rgba(0,255,70,0.12);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.1em;
    }

    .secondary-button:hover {
      background: rgba(0,255,70,0.18);
    }

    .note {
      margin: 14px 0 0;
      color: rgba(255,255,255,0.62);
      text-align: center;
      font-size: 0.78rem;
    }

    .hidden {
      display: none;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .error-shake {
      animation: shake 0.4s ease-in-out;
    }

    .error-field input {
      border-color: rgba(255, 0, 70, 0.6) !important;
      box-shadow: 0 0 16px rgba(255, 0, 70, 0.24) !important;
    }

    .info-note {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.42);
      margin-bottom: 20px;
      line-height: 1.4;
      text-align: center;
    }

    .error-text {
      color: #ff3b69;
      font-size: 0.78rem;
      font-weight: 800;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 59, 105, 0.3);
    }

    .success-icon {
      border-color: rgba(0, 255, 70, 0.6) !important;
      color: #00ff46 !important;
      background: rgba(0, 255, 70, 0.15) !important;
      box-shadow: 0 0 30px rgba(0, 255, 70, 0.25) !important;
    }

    .success-title {
      background: linear-gradient(90deg, #00ff46 0%, #72ff91 100%) !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
    }

    .success-message {
      text-align: center;
      margin: 24px 0;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    .success-sub {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 8px;
      font-weight: 400;
    }

    .terminal-loader {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 12px;
    }

    .loader-bar {
      width: 0%;
      height: 100%;
      background: #00ff46;
      box-shadow: 0 0 12px #00ff46;
    }

    .loader-active {
      animation: loadWorkspace 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes loadWorkspace {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    #workspacePanel {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: #000;
      z-index: 100;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 56px;
      padding: 0 24px;
      background: #050606;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      user-select: none;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-logo-box {
      width: 28px;
      height: 28px;
      border: 1.5px solid rgba(0, 255, 70, 0.36);
      border-radius: 6px;
      background: rgba(0, 255, 70, 0.05);
    }

    .nav-brand {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-capsule {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px 4px 6px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 9999px;
      height: 32px;
    }

    .user-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #00ff46;
      color: #001a07;
      display: grid;
      place-items: center;
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      box-shadow: 0 0 10px rgba(0, 255, 70, 0.3);
    }

    .user-name {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.85);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .nav-icon-btn {
      width: 32px;
      height: 32px;
      background: transparent;
      border: 0;
      color: rgba(255, 255, 255, 0.38);
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
      border-radius: 4px;
      transition: color 0.2s, background-color 0.2s;
    }

    .nav-icon-btn:hover {
      color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-icon-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    .nav-icon-btn .icon-green {
      color: #00ff46;
    }

    .nav-icon-btn svg[fill="currentColor"] {
      fill: currentColor;
      stroke: none;
    }

    .workspace-content {
      flex: 1;
      overflow: auto;
      background:
        radial-gradient(circle at center, rgba(0, 255, 68, 0.02), transparent 30rem),
        radial-gradient(circle at center, #090a0a 0%, #030404 60%, #000 100%);
    }
  </style>
</head>
<body>
  <main class="card">
    <section id="loginPanel">
      <div class="title-row">
        <div class="icon-box">
          <svg viewBox="0 0 24 24">
            <path d="M12 2 20 5.5v6.2c0 4.7-3.2 8.9-8 10.3-4.8-1.4-8-5.6-8-10.3V5.5L12 2Zm0 4.1L8 7.8v3.9c0 2.4 1.5 4.8 4 6.1V6.1Z"/>
          </svg>
        </div>
        <h1>Authentication</h1>
      </div>

      <div class="field">
        <input id="accessKey" type="password" placeholder="enter key" autocomplete="off">
        <button class="lock" id="toggleKey" type="button" aria-label="Show key">
          <svg id="lockIcon" viewBox="0 0 24 24">
            <rect x="6" y="10" width="12" height="10" rx="2"></rect>
            <path d="M8 10V8a4 4 0 0 1 8 0v2"></path>
            <path d="M12 14v3"></path>
          </svg>
        </button>
      </div>

      <button class="auth-button" id="authButton" type="button">Authenticate</button>
      <button class="key-button" id="generateKeyButton" type="button">Generate New Key</button>
      <div class="divider"></div>
    </section>

    <section id="keyPanel" class="hidden">
      <div class="title-row">
        <div class="icon-box">
          <svg viewBox="0 0 24 24">
            <path d="M12 2 20 5.5v6.2c0 4.7-3.2 8.9-8 10.3-4.8-1.4-8-5.6-8-10.3V5.5L12 2Zm0 4.1L8 7.8v3.9c0 2.4 1.5 4.8 4 6.1V6.1Z"/>
          </svg>
        </div>
        <h1>Generate Key</h1>
      </div>

      <p class="label">Generated Access Key</p>
      <div class="generated-key" id="generatedKey"></div>

      <div class="button-row">
        <button class="secondary-button" id="copyButton" type="button">Copy</button>
        <button class="secondary-button" id="downloadButton" type="button">Download</button>
      </div>

      <button class="proceed-button" id="proceedButton" type="button">Proceed To Login</button>
      <p class="note">Save this key securely before proceeding.</p>
    </section>
  </main>

  <main id="setupPanel" class="card hidden">
    <section id="registerPanel">
      <div class="title-row">
        <div class="icon-box">
          <svg viewBox="0 0 24 24" width="21" height="21" fill="currentColor">
            <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
        </div>
        <h1>Registration</h1>
      </div>

      <div class="info-note">Enter system credentials. Username must be alphanumeric (no spaces), max 10 characters.</div>

      <div class="field" id="usernameField">
        <input id="regUsername" type="text" placeholder="username" autocomplete="off" maxlength="10">
      </div>

      <div class="field" id="passwordField">
        <input id="regPassword" type="password" placeholder="password" autocomplete="off">
        <button class="lock" id="toggleRegPassword" type="button" aria-label="Show password">
          <svg id="regLockIcon" viewBox="0 0 24 24">
            <rect x="6" y="10" width="12" height="10" rx="2"></rect>
            <path d="M8 10V8a4 4 0 0 1 8 0v2"></path>
            <path d="M12 14v3"></path>
          </svg>
        </button>
      </div>

      <div class="field" id="confirmPasswordField">
        <input id="regConfirmPassword" type="password" placeholder="confirm password" autocomplete="off">
      </div>

      <div id="registerError" class="error-text hidden"></div>

      <button class="auth-button" id="registerButton" type="button">Initialize System</button>
      <button class="key-button" id="lockTerminalButton" type="button">Lock Terminal</button>
      <div class="divider"></div>
    </section>

    <section id="successPanel" class="hidden">
      <div class="title-row">
        <div class="icon-box success-icon">
          <svg viewBox="0 0 24 24" width="21" height="21" fill="currentColor">
            <path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </div>
        <h1 class="success-title">Success</h1>
      </div>
      <div class="success-message">
        <p>SYSTEM INITIALIZED</p>
        <p class="success-sub">Loading secure terminal workspace...</p>
      </div>
      <div class="terminal-loader">
        <div class="loader-bar" id="loaderBar"></div>
      </div>
    </section>
  </main>

  <div id="workspacePanel" class="hidden">
    <header class="navbar">
      <div class="nav-left">
        <div class="nav-logo-box"></div>
        <span class="nav-brand">IXKHLM</span>
      </div>
      <div class="nav-right">
        <div class="user-capsule">
          <div class="user-avatar" id="navAvatar">U</div>
          <span class="user-name" id="navUsername">Username</span>
        </div>
        
        <button class="nav-icon-btn" aria-label="Globe" type="button">
          <svg viewBox="0 0 24 24" class="icon-green">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M2.5 12h19M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" stroke="currentColor" stroke-width="2" fill="none"/>
          </svg>
        </button>

        <button class="nav-icon-btn" aria-label="Theme" type="button">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>

        <button class="nav-icon-btn" id="logoutButton" aria-label="Logout" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5a2 2 0 0 0-2 2v4h2V5h14v14H5v-4H3v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="workspace-content">
      <!-- Blank container for future wiki dashboard -->
    </main>
  </div>

  <script>
    const card = document.querySelector(".card");
    const loginPanel = document.getElementById("loginPanel");
    const keyPanel = document.getElementById("keyPanel");
    const setupPanel = document.getElementById("setupPanel");
    const accessKey = document.getElementById("accessKey");
    const toggleKey = document.getElementById("toggleKey");
    const lockIcon = document.getElementById("lockIcon");
    const authButton = document.getElementById("authButton");
    const generateKeyButton = document.getElementById("generateKeyButton");
    const generatedKey = document.getElementById("generatedKey");
    const copyButton = document.getElementById("copyButton");
    const downloadButton = document.getElementById("downloadButton");
    const proceedButton = document.getElementById("proceedButton");

    // Registration UI elements
    const registerPanel = document.getElementById("registerPanel");
    const successPanel = document.getElementById("successPanel");
    const regUsername = document.getElementById("regUsername");
    const regPassword = document.getElementById("regPassword");
    const regConfirmPassword = document.getElementById("regConfirmPassword");
    const toggleRegPassword = document.getElementById("toggleRegPassword");
    const regLockIcon = document.getElementById("regLockIcon");
    const registerButton = document.getElementById("registerButton");
    const lockTerminalButton = document.getElementById("lockTerminalButton");
    const registerError = document.getElementById("registerError");
    const loaderBar = document.getElementById("loaderBar");
    const workspacePanel = document.getElementById("workspacePanel");
    const navUsername = document.getElementById("navUsername");
    const navAvatar = document.getElementById("navAvatar");
    const logoutButton = document.getElementById("logoutButton");

    let currentKey = localStorage.getItem("ixkhlm_access_key") || "";

    function generateAccessKey() {
      const bytes = new Uint8Array(32);
      crypto.getRandomValues(bytes);

      return Array.from(bytes)
        .map(byte => byte.toString(16).padStart(2, "0"))
        .join("");
    }

    function showKeyPanel() {
      currentKey = generateAccessKey();
      localStorage.setItem("ixkhlm_access_key", currentKey);
      generatedKey.textContent = currentKey.slice(0, 32) + "\n" + currentKey.slice(32);
      loginPanel.classList.add("hidden");
      keyPanel.classList.remove("hidden");
    }

    function showLoginPanel() {
      accessKey.value = "";
      loginPanel.classList.remove("hidden");
      keyPanel.classList.add("hidden");
      accessKey.focus();
    }

    function handleAuthenticate() {
      const enteredKey = accessKey.value.trim();
      const savedKey = localStorage.getItem("ixkhlm_access_key") || currentKey;

      if (enteredKey === savedKey && savedKey !== "") {
        // Delete access key from storage and memory immediately (single use)
        localStorage.removeItem("ixkhlm_access_key");
        currentKey = "";

        // Reset registration panel states to pristine
        regUsername.value = "";
        regPassword.value = "";
        regConfirmPassword.value = "";
        clearRegisterError();
        registerPanel.classList.remove("hidden");
        successPanel.classList.add("hidden");
        loaderBar.classList.remove("loader-active");

        // Authenticated successfully! Hide login card, show registration setup card
        card.classList.add("hidden");
        setupPanel.classList.remove("hidden");
      } else {
        // Failed authentication: shake field and add temporary error glow
        const field = accessKey.closest(".field");
        field.classList.add("error-shake", "error-field");
        
        // Remove error classes after animation completes
        setTimeout(() => {
          field.classList.remove("error-shake", "error-field");
        }, 400);
      }
    }

    toggleKey.addEventListener("click", () => {
      const isHidden = accessKey.type === "password";
      accessKey.type = isHidden ? "text" : "password";
      toggleKey.setAttribute("aria-label", isHidden ? "Hide key" : "Show key");

      lockIcon.innerHTML = isHidden
        ? '<rect x="6" y="10" width="12" height="10" rx="2"></rect><path d="M8 10V8a4 4 0 0 1 7.5-2"></path><path d="M12 14v3"></path>'
        : '<rect x="6" y="10" width="12" height="10" rx="2"></rect><path d="M8 10V8a4 4 0 0 1 8 0v2"></path><path d="M12 14v3"></path>';
    });

    generateKeyButton.addEventListener("click", showKeyPanel);

    copyButton.addEventListener("click", async () => {
      await navigator.clipboard.writeText(currentKey);
      copyButton.textContent = "Copied";
      setTimeout(() => copyButton.textContent = "Copy", 1200);
    });

    downloadButton.addEventListener("click", () => {
      const file = new Blob([currentKey], { type: "text/plain" });
      const url = URL.createObjectURL(file);
      const link = document.createElement("a");

      link.href = url;
      link.download = "ixkhlm-access-key.txt";
      link.click();

      URL.revokeObjectURL(url);
    });

    proceedButton.addEventListener("click", showLoginPanel);

    // Registration helper database methods
    function getAccounts() {
      const data = localStorage.getItem("ixkhlm_accounts");
      return data ? JSON.parse(data) : [];
    }

    function saveAccounts(accounts) {
      localStorage.setItem("ixkhlm_accounts", JSON.stringify(accounts));
    }

    function showRegisterError(message, targetFields = []) {
      registerError.textContent = message;
      registerError.classList.remove("hidden");
      
      targetFields.forEach(fieldId => {
        const fieldEl = document.getElementById(fieldId);
        if (fieldEl) {
          fieldEl.classList.add("error-shake", "error-field");
          setTimeout(() => {
            fieldEl.classList.remove("error-shake", "error-field");
          }, 400);
        }
      });
    }

    function clearRegisterError() {
      registerError.textContent = "";
      registerError.classList.add("hidden");
    }

    toggleRegPassword.addEventListener("click", () => {
      const isHidden = regPassword.type === "password";
      regPassword.type = isHidden ? "text" : "password";
      regConfirmPassword.type = isHidden ? "text" : "password";
      toggleRegPassword.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");

      regLockIcon.innerHTML = isHidden
        ? '<rect x="6" y="10" width="12" height="10" rx="2"></rect><path d="M8 10V8a4 4 0 0 1 7.5-2"></path><path d="M12 14v3"></path>'
        : '<rect x="6" y="10" width="12" height="10" rx="2"></rect><path d="M8 10V8a4 4 0 0 1 8 0v2"></path><path d="M12 14v3"></path>';
    });

    lockTerminalButton.addEventListener("click", () => {
      regUsername.value = "";
      regPassword.value = "";
      regConfirmPassword.value = "";
      clearRegisterError();
      setupPanel.classList.add("hidden");
      card.classList.remove("hidden");
      showLoginPanel();
    });

    function handleRegister() {
      clearRegisterError();

      const username = regUsername.value.trim();
      const password = regPassword.value;
      const confirmPassword = regConfirmPassword.value;

      // 1. Username alphanumeric structure and size checks (3-10 chars)
      const usernameRegex = /^[a-zA-Z0-9]{3,10}$/;
      if (!usernameRegex.test(username)) {
        showRegisterError("Username must be alphanumeric (no spaces) and 3 to 10 characters long.", ["usernameField"]);
        return;
      }

      // 2. Uniqueness check (case-insensitive)
      const accounts = getAccounts();
      const duplicate = accounts.some(acc => acc.username.toLowerCase() === username.toLowerCase());
      if (duplicate) {
        showRegisterError("Username is already taken.", ["usernameField"]);
        return;
      }

      // 3. Password length check
      if (password.length < 8) {
        showRegisterError("Password must be at least 8 characters long.", ["passwordField", "confirmPasswordField"]);
        return;
      }

      // 4. Password complexity check (minimum 1 letter and 1 number/digit)
      const hasLetter = /[a-zA-Z]/.test(password);
      const hasDigit = /\d/.test(password);
      if (!hasLetter || !hasDigit) {
        showRegisterError("Password must contain at least one letter and one number.", ["passwordField", "confirmPasswordField"]);
        return;
      }

      // 5. Confirm Password mismatch check
      if (password !== confirmPassword) {
        showRegisterError("Passwords do not match.", ["passwordField", "confirmPasswordField"]);
        return;
      }

      // Save account registration details
      accounts.push({
        username: username,
        password: password
      });
      saveAccounts(accounts);

      // Transition to success loader state
      registerPanel.classList.add("hidden");
      successPanel.classList.remove("hidden");
      loaderBar.classList.add("loader-active");

      // Redirect into terminal workspace after 2 seconds loader animation
      setTimeout(() => {
        // Set user profile capsule details
        navUsername.textContent = username;
        navAvatar.textContent = username.charAt(0).toUpperCase();

        setupPanel.classList.add("hidden");
        workspacePanel.classList.remove("hidden");
      }, 2000);
    }

    registerButton.addEventListener("click", handleRegister);

    [regUsername, regPassword, regConfirmPassword].forEach(input => {
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          handleRegister();
        }
      });
    });
    
    // Add authentication button and Enter key listeners
    authButton.addEventListener("click", handleAuthenticate);
    accessKey.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        handleAuthenticate();
      }
    });

    // Handle logout button click
    logoutButton.addEventListener("click", () => {
      workspacePanel.classList.add("hidden");
      card.classList.remove("hidden");
      showLoginPanel();
    });
  </script>
</body>
</html>
