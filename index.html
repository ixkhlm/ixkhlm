<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ixkhlm.wiki</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.025) 25%, transparent 25%) 0 0 / 18px 18px,
        linear-gradient(135deg, transparent 75%, rgba(255,255,255,0.018) 75%) 0 0 / 18px 18px,
        #101214;
      color: #f2f2f2;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      position: relative;
      min-height: 100vh;
    }

    .login-button {
      position: absolute;
      top: 0;
      right: 0;
      min-width: 210px;
      height: 86px;
      padding: 0 30px;
      color: #f2f2f2;
      background: rgba(255, 255, 255, 0.035);
      border: 2px solid rgba(255, 255, 255, 0.88);
      border-top: 0;
      border-right: 0;
      border-radius: 0;
      font: inherit;
      font-size: clamp(2rem, 4vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.02em;
      cursor: pointer;
    }

    .login-button:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .login-button:active {
      background: rgba(255, 255, 255, 0.12);
    }

    .welcome {
      position: absolute;
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      font-size: clamp(4rem, 9vw, 9rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      white-space: nowrap;
    }

    @media (max-width: 700px) {
      .login-button {
        min-width: 145px;
        height: 62px;
        padding: 0 18px;
        font-size: 2rem;
      }

      .welcome {
        font-size: clamp(3rem, 16vw, 5rem);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <button class="login-button" type="button">login</button>
    <h1 class="welcome">welcome</h1>
  </main>
</body>
</html>
