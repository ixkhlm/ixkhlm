<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ixkhlm.wiki</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(0, 255, 80, 0.045), transparent 24rem),
        radial-gradient(circle at center, #101212 0%, #050606 52%, #000 100%);
      color: #e9ffee;
      font-family: Arial, Helvetica, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 4px 4px;
      opacity: 0.18;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 0%, transparent 46%, rgba(0,0,0,0.78) 100%);
    }

    .auth-card {
      position: relative;
      z-index: 1;
      width: min(520px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(18,20,20,0.94), rgba(8,9,9,0.94));
      box-shadow:
        0 26px 80px rgba(0,0,0,0.62),
        inset 0 1px 0 rgba(255,255,255,0.035);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .icon-box {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(0,255,77,0.42);
      border-radius: 9px;
      background: rgba(0,255,77,0.08);
      color: #00ff4c;
      box-shadow: 0 0 26px rgba(0,255,77,0.12);
    }

    .icon-box svg {
      width: 21px;
      height: 21px;
      fill: currentColor;
    }

    h1 {
      margin: 0;
      color: #dfffe6;
      font-size: 1.25rem;
      line-height: 1;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 span {
      color: #00ff4c;
    }

    .field {
      position: relative;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 48px 0 16px;
      color: #f2fff4;
      background: rgba(0,0,0,0.24);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 7px;
      outline: none;
      font: inherit;
      letter-spacing: 0.12em;
    }

    input::placeholder {
      color: rgba(255,255,255,0.34);
    }

    .lock {
      position: absolute;
      top: 50%;
      right: 10px;
      width: 28px;
      height: 28px;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      border: 1px solid rgba(0,255,77,0.36);
      border-radius: 6px;
      color: #00ff4c;
      background: rgba(0,255,77,0.08);
    }

    .lock svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 9px;
      color: #001b08;
      background: #00f044;
      font: inherit;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: default;
      box-shadow: 0 14px 34px rgba(0,255,77,0.18);
    }

    .ghost-button {
      display: block;
      width: fit-content;
      margin: 22px auto 0;
      border: 0;
      color: #00ff4c;
      background: transparent;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: default;
    }

    .divider {
      height: 1px;
      margin-top: 24px;
      background: rgba(255,255,255,0.08);
    }

    @media (max-width: 560px) {
      .auth-card {
        padding: 24px;
      }

      h1 {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="auth-card" aria-label="Authentication panel">
    <div class="title-row">
      <div class="icon-box" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 2 20 5.5v6.2c0 4.7-3.2 8.9-8 10.3-4.8-1.4-8-5.6-8-10.3V5.5L12 2Zm0 4.1L8 7.8v3.9c0 2.4 1.5 4.8 4 6.1V6.1Z"/>
        </svg>
      </div>
      <h1>Authen<span>tication</span></h1>
    </div>

    <div class="field">
      <input type="password" value="000000000000" aria-label="Access key">
      <div class="lock" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <rect x="6" y="10" width="12" height="10" rx="2"></rect>
          <path d="M8 10V8a4 4 0 0 1 8 0v2"></path>
          <path d="M12 14v3"></path>
        </svg>
      </div>
    </div>

    <button type="button">Authenticate</button>
    <a class="ghost-button" href="#">Generate New Key</a>
    <div class="divider"></div>
  </main>
</body>
</html>
