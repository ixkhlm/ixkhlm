<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ixkhlm.wiki</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(0, 255, 68, 0.04), transparent 25rem),
        radial-gradient(circle at center, #101111 0%, #050606 54%, #000 100%);
      color: #eaffef;
      font-family: Arial, Helvetica, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.014) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);
      background-size: 4px 4px;
      opacity: 0.28;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 0%, transparent 45%, rgba(0,0,0,0.82) 100%);
    }

    .auth-card {
      position: relative;
      z-index: 1;
      width: min(520px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(18,20,20,0.94), rgba(8,9,9,0.94));
      box-shadow:
        0 28px 90px rgba(0,0,0,0.68),
        inset 0 1px 0 rgba(255,255,255,0.035);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .icon-box {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(0,255,70,0.42);
      border-radius: 9px;
      background: rgba(0,255,70,0.08);
      color: #00ff46;
      box-shadow: 0 0 26px rgba(0,255,70,0.12);
    }

    .icon-box svg {
      width: 21px;
      height: 21px;
      fill: currentColor;
    }

    h1 {
      margin: 0;
      font-size: 1.22rem;
      line-height: 1;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      background: linear-gradient(
        90deg,
        #eaffef 0%,
        #eaffef 38%,
        #00ff46 50%,
        #eaffef 62%,
        #eaffef 100%
      );
      background-size: 220% 100%;
      background-position: 100% 0;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: textSweep 2.4s linear infinite;
    }

    h1 span {
      color: inherit;
    }

    @keyframes textSweep {
      from {
        background-position: 100% 0;
      }

      to {
        background-position: -120% 0;
      }
    }

    .field {
      position: relative;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 48px 0 16px;
      color: rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.24);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 7px;
      outline: none;
      font: inherit;
      letter-spacing: 0.12em;
    }

    .lock {
      position: absolute;
      top: 50%;
      right: 10px;
      width: 28px;
      height: 28px;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      border: 1px solid rgba(0,255,70,0.36);
      border-radius: 6px;
      color: #00ff46;
      background: rgba(0,255,70,0.08);
    }

    .lock svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    button {
      font: inherit;
      border: 0;
      text-transform: uppercase;
      cursor: pointer;
    }

    .auth-button {
      width: 100%;
      height: 52px;
      border-radius: 9px;
      color: #001a07;
      background: #00f044;
      font-weight: 800;
      letter-spacing: 0.12em;
      box-shadow: 0 14px 34px rgba(0,255,70,0.18);
    }

    .auth-button:hover {
      background: #16ff57;
    }

    .auth-button:active {
      transform: translateY(1px);
      background: #00d83d;
    }

    .key-button {
      display: block;
      width: fit-content;
      margin: 22px auto 0;
      padding: 0;
      color: #00ff46;
      background: transparent;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.1em;
    }

    .key-button:hover {
      color: #78ff98;
    }

    .divider {
      height: 1px;
      margin-top: 24px;
      background: rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="title-row">
      <div class="icon-box">
        <svg viewBox="0 0 24 24">
          <path d="M12 2 20 5.5v6.2c0 4.7-3.2 8.9-8 10.3-4.8-1.4-8-5.6-8-10.3V5.5L12 2Zm0 4.1L8 7.8v3.9c0 2.4 1.5 4.8 4 6.1V6.1Z"/>
        </svg>
      </div>
      <h1>Authen<span>tication</span></h1>
    </div>

    <div class="field">
      <input type="password" value="000000000000" readonly>
      <div class="lock">
        <svg viewBox="0 0 24 24">
          <rect x="6" y="10" width="12" height="10" rx="2"></rect>
          <path d="M8 10V8a4 4 0 0 1 8 0v2"></path>
          <path d="M12 14v3"></path>
        </svg>
      </div>
    </div>

    <button class="auth-button" type="button">Authenticate</button>
    <button class="key-button" type="button">Generate New Key</button>
    <div class="divider"></div>
  </main>
</body>
</html>
